  <style>
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }
    .post-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .post-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      text-decoration: none;
    }
    .post-card-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .post-category {
      display: inline-block;
      font-size: .75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      margin-bottom: .6rem;
    }
    .cat-장기요양 { background: var(--color-primary-light); color: var(--color-primary); }
    .cat-기초연금  { background: var(--color-accent-light);  color: var(--color-accent);  }
    .cat-노인일자리{ background: var(--color-warning-light); color: var(--color-warning); }
    .cat-의료비    { background: #fce7f3; color: #be185d; }
    .cat-복지정책  { background: #ede9fe; color: #7c3aed; }
    .cat-요양원    { background: #e0f2fe; color: #0369a1; }
    .post-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: .5rem;
      line-height: 1.5;
    }
    .post-excerpt {
      font-size: .875rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      flex: 1;
    }
    .post-meta {
      font-size: .78rem;
      color: var(--color-text-muted);
      margin-top: 1rem;
      padding-top: .75rem;
      border-top: 1px solid var(--color-border);
    }
    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .tag-btn {
      padding: .3rem .9rem;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: var(--color-white);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
    }
    .tag-btn.active, .tag-btn:hover {
      background: var(--color-primary);
      color: var(--color-white);
      border-color: var(--color-primary);
    }
    @media (max-width: 480px) {
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    /* =====================================================
       블로그 글 목록 — 새 글 추가 시 여기에 항목 추가

        category: '복지정책',

      {

        category: '장기요양',
        date: '2026-06-30',
        readMin: 9,
      },
      {
        slug: '2026-06-27-nursing-home-vs-hospital',
        title: '요양원 vs 요양병원 차이점과 선택 기준 총정리',
        excerpt: '헷갈리는 요양원과 요양병원, 비용·입소조건·의료서비스까지 한눈에 비교하고 우리 가족에 맞는 곳을 고르세요.',
        category: '요양원',
        date: '2026-06-27',
        readMin: 8,
      },
      {
        slug: '2026-06-25-senior-job-types-guide',
        title: '노인일자리사업 종류별 신청 방법과 급여 (2026년)',
        excerpt: '공익활동·사회서비스형·시장형까지! 유형별 월 급여와 신청 자격, 신청 방법을 한눈에 정리했습니다.',
        category: '노인일자리',
        date: '2026-06-25',
        readMin: 8,
      },
      {
        slug: '2026-06-25-senior-dementia-support',
        title: '치매 어르신 돌봄 지원 제도 총정리 (2026년)',
        excerpt: '치매안심센터부터 치매 가족휴가제, 진단·치료비 지원까지! 알면 돈 되는 치매 돌봄 혜택을 한눈에 정리했습니다.',
        category: '복지정책',

        readMin: 8,
      },
      {
        slug: '2026-06-24-basic-pension-guide',
        title: '기초연금 수급자격·금액 완벽 정리 (2026년)',
        excerpt: '2026년 기초연금 얼마나 받을까? 소득인정액 기준, 단독·부부 금액, 신청 방법까지 한눈에 정리했습니다.',
        category: '기초연금',
        date: '2026-06-24',
        readMin: 8,
      },
      {
        slug: '2026-06-22-nursing-home-checklist',
        title: '요양원 고를 때 꼭 확인해야 할 체크리스트 15가지',
        excerpt: '막상 가보면 사진이랑 달라요. 위치·비용·직원·환경·평가등급까지, 방문 전 반드시 챙겨야 할 15가지를 정리했습니다.',
        category: '요양원',
        date: '2026-06-22',
        readMin: 7,
      },
      {
        slug: '2026-06-22-ltc-grade-apply-guide',
        title: '장기요양등급 신청, 처음부터 끝까지 완벽 가이드',
        excerpt: '부모님이 요양원이 필요할 것 같은데 어디서 시작해야 할지 막막하신가요? 등급 신청부터 결과 수령까지 단계별로 정리했습니다.',
        category: '장기요양',
        date: '2026-06-22',
        readMin: 5,
      },
    ];
    /* ===================================================== */

    let currentFilter = '전체';

    function renderPosts(posts) {
      const grid = document.getElementById('postGrid');
      if (!posts.length) {
        grid.innerHTML = '<p style="color:var(--color-text-muted);">해당 카테고리 글이 없습니다.</p>';
        return;
      }
      grid.innerHTML = posts.map(p => `
        <a class="post-card" href="${p.slug}.html">
          <div class="post-card-body">
            <span class="post-category cat-${p.category}">${p.category}</span>
            <div class="post-title">${p.title}</div>
            <div class="post-excerpt">${p.excerpt}</div>
            <div class="post-meta">${formatDate(p.date)} · 읽는 시간 약 ${p.readMin}분</div>
          </div>
        </a>
      `).join('');
    }

    function filterPosts(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = cat === '전체' ? POSTS : POSTS.filter(p => p.category === cat);
      renderPosts(filtered);
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    }

    renderPosts(POSTS);
  </script>

</body>
