name: Auto Blog Post

on:
  schedule:
    # 화(2), 목(4), 토(6) 오전 10시 KST (= UTC 01:00)
    - cron: '0 1 * * 2,4,6'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add blog/ sitemap.xml
          git diff --cached --quiet || git commit -m "auto: 블로그 글 자동 발행 $(date +'%Y-%m-%d')"
          git push

      - name: Send email notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: kyukyurin123@gmail.com
          from: 시니어 정보 자동발행 <${{ secrets.MAIL_USERNAME }}>
          subject: "📝 새 블로그 글이 발행되었습니다 ($(date +'%Y-%m-%d'))"
          body: |
            안녕하세요!

            시니어 정보 블로그에 새 글이 자동 발행되었습니다.

            🔗 블로그 확인하기: https://senior.information-gyuri.com/blog/

            ---
            카카오채널 소식에도 올려주세요!
            채널: https://pf.kakao.com/_wnuwX

            시니어 정보 자동발행 시스템
