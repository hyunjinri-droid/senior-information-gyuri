  <section class="hero">

  <main class="section">
    <div class="container">

      <div class="card">
        <h2 class="section-title">지역 검색</h2>

        <div class="search-grid" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; align-items: end;">
          <div class="form-group" style="margin:0;">
            <label class="form-label" for="sido">시/도</label>
            <select class="form-select" id="sido" onchange="updateSigungu()">
              <option value="">시/도 선택</option>
              <option>서울특별시</option>
              <option>부산광역시</option>
              <option>대구광역시</option>
              <option>인천광역시</option>
              <option>광주광역시</option>
              <option>대전광역시</option>
              <option>울산광역시</option>
              <option>세종특별자치시</option>
              <option>경기도</option>
              <option>강원특별자치도</option>
              <option>충청북도</option>
              <option>충청남도</option>
              <option>전북특별자치도</option>

            </select>
          </div>

          <div class="form-group" style="margin:0;">
            <label class="form-label" for="sigungu">시/군/구</label>
            <select class="form-select" id="sigungu">
              <option value="">시/도를 먼저 선택하세요</option>
            </select>
          </div>

          <button class="btn btn-primary" onclick="searchFacilities(1)">검색</button>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>검색 중입니다...</p>
      </div>

      <div id="results" style="margin-top:1.5rem;"></div>
      <div class="pagination" id="pagination"></div>

    </div>
  </main>

  <footer class="site-footer">

      <p><strong style="color:#e5e7eb;">시니어 정보</strong></p>

        최신 정보 및 입소 문의는 해당 기관에 직접 확인하시기 바랍니다.
      </div>
    </div>
  </footer>

  <script>
    const SIGUNGU = {
      '서울특별시': ['강남구','강동구','강북구','강서구','관악구','광진구','구로구','금천구','노원구','도봉구','동대문구','동작구','마포구','서대문구','서초구','성동구','성북구','송파구','양천구','영등포구','용산구','은평구','종로구','중구','중랑구'],
      '부산광역시': ['강서구','금정구','기장군','남구','동구','동래구','부산진구','북구','사상구','사하구','서구','수영구','연제구','영도구','중구','해운대구'],
      '대구광역시': ['군위군','남구','달서구','달성군','동구','북구','서구','수성구','중구'],
      '인천광역시': ['강화군','계양구','남동구','동구','미추홀구','부평구','서구','연수구','옹진군','중구'],
      '광주광역시': ['광산구','남구','동구','북구','서구'],
      '대전광역시': ['대덕구','동구','서구','유성구','중구'],
      '울산광역시': ['남구','동구','북구','울주군','중구'],
      '세종특별자치시': ['세종시'],
      '경기도': ['가평군','고양시 덕양구','고양시 일산동구','고양시 일산서구','과천시','광명시','광주시','구리시','군포시','김포시','남양주시','동두천시','부천시','성남시 분당구','성남시 수정구','성남시 중원구','수원시 권선구','수원시 영통구','수원시 장안구','수원시 팔달구','시흥시','안산시 단원구','안산시 상록구','안성시','안양시 동안구','안양시 만안구','양주시','양평군','여주시','연천군','오산시','용인시 기흥구','용인시 수지구','용인시 처인구','의왕시','의정부시','이천시','파주시','평택시','포천시','하남시','화성시'],
      '강원특별자치도': ['강릉시','고성군','동해시','삼척시','속초시','양구군','양양군','영월군','원주시','인제군','정선군','철원군','춘천시','태백시','평창군','홍천군','화천군','횡성군'],
      '충청북도': ['괴산군','단양군','보은군','영동군','옥천군','음성군','제천시','증평군','진천군','청주시 상당구','청주시 서원구','청주시 청원구','청주시 흥덕구','충주시'],
      '충청남도': ['계룡시','공주시','금산군','논산시','당진시','보령시','부여군','서산시','서천군','아산시','예산군','천안시 동남구','천안시 서북구','청양군','태안군','홍성군'],
      '전북특별자치도': ['고창군','군산시','김제시','남원시','무주군','부안군','순창군','완주군','익산시','임실군','장수군','전주시 덕진구','전주시 완산구','정읍시','진안군'],
      '전라남도': ['강진군','고흥군','곡성군','광양시','구례군','나주시','담양군','목포시','무안군','보성군','순천시','신안군','여수시','영광군','영암군','완도군','장성군','장흥군','진도군','함평군','해남군','화순군'],
      '경상북도': ['경산시','경주시','고령군','구미시','군위군','김천시','문경시','봉화군','상주시','성주군','안동시','영덕군','영양군','영주시','영천시','예천군','울릉군','울진군','의성군','청도군','청송군','칠곡군','포항시 남구','포항시 북구'],
      '경상남도': ['거제시','거창군','고성군','김해시','남해군','밀양시','사천시','산청군','양산시','의령군','진주시','창녕군','창원시 마산합포구','창원시 마산회원구','창원시 성산구','창원시 의창구','창원시 진해구','통영시','하동군','함안군','함양군','합천군'],
      '제주특별자치도': ['서귀포시','제주시'],
    };

    function updateSigungu() {
      const sido = document.getElementById('sido').value;
      const sel = document.getElementById('sigungu');
      sel.innerHTML = '';

      if (!sido || !SIGUNGU[sido]) {
        sel.innerHTML = '<option value="">시/도를 먼저 선택하세요</option>';
        return;
      }

      sel.innerHTML = '<option value="">전체</option>' +
        SIGUNGU[sido].map(s => `<option value="${s}">${s}</option>`).join('');
    }

    let currentPage = 1;

    async function searchFacilities(page) {
      const sido = document.getElementById('sido').value;
      const sigungu = document.getElementById('sigungu').value.trim();

      if (!sido) {
        alert('시/도를 선택해주세요.');
        return;
      }

      currentPage = page;
      toggleLoading(true);
      document.getElementById('results').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';

      try {
        const params = new URLSearchParams({ sido, sigungu, pageIndex: page });
        const res = await fetch(`/api/ltc/search?${params}`);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        renderResults(data);
      } catch (e) {
        document.getElementById('results').innerHTML =
          `<div class="alert alert-warning">검색 중 오류가 발생했습니다: ${e.message}</div>`;
      } finally {
        toggleLoading(false);
      }
    }

    function renderResults(data) {
      const items = data?.items || [];
      const total = data?.totalCount || 0;
      const resultsEl = document.getElementById('results');

      if (!items.length) {
        resultsEl.innerHTML = '<div class="alert alert-info">검색 결과가 없습니다. 다른 지역을 검색해보세요.</div>';
        return;
      }

      resultsEl.innerHTML = `<p style="margin-bottom:1rem; color:var(--color-text-muted);">총 <strong>${total}</strong>개 기관</p>` +
        items.map(item => `
          <div class="facility-card">
            <h3>${item.name || '(기관명 없음)'}</h3>
            <div class="facility-meta">
              <span>📍 ${item.address || '-'}</span>
              <span>📞 ${item.tel || '-'}</span>
              ${item.facilityType ? `<span>${item.facilityType}</span>` : ''}
              ${item.grade ? `<span class="facility-grade grade-${gradeClass(item.grade)}">${item.grade}등급</span>` : ''}
            </div>
          </div>
        `).join('');

      renderPagination(total);
    }

    function gradeClass(grade) {
      if (grade === 'A' || grade === '1') return 'a';
      if (grade === 'B' || grade === '2') return 'b';
      return 'c';
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / 10);
      if (totalPages <= 1) return;

      const pagEl = document.getElementById('pagination');
      let html = '';
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);

      if (currentPage > 1) html += `<button class="page-btn" onclick="searchFacilities(${currentPage - 1})">◀</button>`;
      for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="searchFacilities(${i})">${i}</button>`;
      }
      if (currentPage < totalPages) html += `<button class="page-btn" onclick="searchFacilities(${currentPage + 1})">▶</button>`;

      pagEl.innerHTML = html;
    }

    function toggleLoading(show) {
      document.getElementById('loading').classList.toggle('visible', show);
    }

  </script>

  <script src="js/common.js"></script>
</body>
</html>
